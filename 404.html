<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1A1A1A" />
  <title>Page Not Found — Aldermere</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <style>
    .nf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:#14110d;color:#fff;padding:2rem;}
    .nf__code{font-family:var(--serif);font-size:clamp(4rem,14vw,9rem);line-height:1;color:var(--accent);margin:0;}
    .nf h1{font-family:var(--serif);font-weight:500;font-size:clamp(1.6rem,4vw,2.6rem);margin:.6rem 0 1rem;}
    .nf p{color:rgba(255,255,255,.72);max-width:46ch;line-height:1.7;margin:0 0 2rem;font-weight:300;}
    .nf .btn{background:var(--accent);color:#111;padding:.9em 1.8em;border-radius:2px;text-transform:uppercase;letter-spacing:.14em;font-size:.8rem;text-decoration:none;}
  </style>
</head>
<body>
  <main class="nf">
    <p class="nf__code">404</p>
    <h1>This page has moved, or never existed.</h1>
    <p>The page you're looking for isn't here. Let's get you back to something beautiful.</p>
    <a class="btn" href="/">Return Home</a>
  </main>
</body>
</html>
