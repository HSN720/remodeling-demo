# Aldermere static site — drop into /etc/nginx/sites-available/ and symlink to sites-enabled.
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;   # <-- change to your domain

    root /var/www/aldermere;                    # <-- path to the uploaded hosting-build
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;

    location ~* \.(jpg|jpeg|png|webp|svg|mp4|woff2|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
